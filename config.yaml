# config.yaml

engine:
  # Pod sleeps for a configurable interval before starting a trading cycle
  sleep_interval_seconds: 3600  
  # How many historical candles to fetch per cycle
  fetch_candles_limit: 180
  # The timeframe for the candles
  timeframe: "1h"

risk:
  # Maximum percentage of total portfolio allowed in a single asset
  max_exposure_per_asset_pct: 0.20
  # Hard cap on daily turnover to prevent over-trading
  max_daily_turnover_pct: 1.00

strategy:
  # The specific strategy class to load
  name: "ExampleStrategy"
  # These parameters will be auto-injected (**kwargs) into the strategy class
  params:
    fast_ma: 10
    slow_ma: 21
    supported_symbols:
      - "BTCUSDT"
      - "ETHUSDT"