# src/trading_pod/config.yaml

# General Pod Settings
poll_interval_seconds: 60  # Only used if fallback polling is needed
lookback: 50               # Number of historical candles to fetch for strategy
assets:
  - AAPL
  - TSLA
  - SPY

# Strategy Configuration
strategy:
  name: "PingPongStrat"
  timeframe: "1h"
  trade_every: "1h"
  params:
    sma_window: 20
    buy_threshold: 10.00   # Buy always (testing)
    sell_threshold: 20.00  # 

# Risk Management 
risk:
  max_notional_per_order: 1000.0      
  max_total_notional_per_symbol: 5000.0  

# Execution Configuration
execution:
  type: "mock"  
  paper: true