# Example Engine Configuration
# Copy this to your strategy directory and customize as needed

# General Pod Settings
poll_interval_seconds: 60  # How often to check DB for new candles (seconds)
lookback: 50               # Number of historical candles to fetch for strategy
assets:
  - AAPL
  - TSLA
  - SPY

# Strategy Configuration
strategy:
  # Option 1: Use class_path (recommended for new strategies)
  class_path: "src.engine_py.src.strategy.example_strat.example_strat.ExampleStrat"
  
  # Option 2: Use name (for backward compatibility with registered strategies)
  # name: "ExampleStrategy"
  
  timeframe: "1h"  # "1h" or "1d" - determines which candle table to query

  # Optional: trade on a different frequency than the candle timeframe.
  # Defaults to timeframe if omitted (trade on every new candle).
  # Examples: timeframe "1h" + trade_every "1d" = read hourly candles, trade once per day.
  # trade_every: "1d"

  params:
    sma_window: 20

# Risk Management (currently pass-through, but structure ready for future use)
risk:
  # max_notional_per_order: 1000.0      # Cap per single order (USD)
  # max_total_notional_per_symbol: 5000.0  # Cap total exposure per symbol (USD)

# Execution Configuration
execution:
  type: "mock"  # "alpaca" for real trades, "mock" for testing
  paper: true   # Only used when type="alpaca"

# Optional: Discord webhook for trade notifications
# discord_webhook_url: "https://discord.com/api/webhooks/..."
