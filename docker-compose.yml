services:
  internal_db:
    image: postgres:15-alpine
    container_name: tic_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tic_user
      POSTGRES_PASSWORD: tic_password
      POSTGRES_DB: tic_market_data
    ports:
      - "5432:5432"
    volumes:
      - tic_postgres_data:/var/lib/postgresql/data
      # Automatically run the schema script on first boot
      - ./src/etl_hub/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  etl_hub:
    build:
      context: .
      dockerfile: src/etl_hub/Dockerfile
    container_name: tic_etl
    restart: unless-stopped
    depends_on:
      - internal_db
    env_file:
      - ./secrets/etl.env
    environment:
      DATABASE_URL: postgresql://tic_user:tic_password@internal_db:5432/tic_market_data

  trading_pod_one:
    build:
      context: .
      dockerfile: src/trading_pod/Dockerfile
    container_name: tic_pod_one
    restart: unless-stopped
    depends_on:
      - internal_db
    env_file:
      - ./secrets/strat_one.env
    environment:
      DATABASE_URL: postgresql://tic_user:tic_password@internal_db:5432/tic_market_data
    volumes:
      - ./src/trading_pod/config.yaml:/app/src/trading_pod/config.yaml:ro
  
  trading_pod_two:
    build:
      context: .
      dockerfile: src/trading_pod/Dockerfile
    container_name: tic_pod_two
    restart: unless-stopped
    depends_on:
      - internal_db
    env_file:
      - ./secrets/strat_two.env
    environment:
      DATABASE_URL: postgresql://tic_user:tic_password@internal_db:5432/tic_market_data
    volumes:
      - ./src/trading_pod/config.yaml:/app/src/trading_pod/config.yaml:ro

volumes:
  tic_postgres_data: