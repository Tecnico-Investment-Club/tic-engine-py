# Template definition
x-trading-template: &trading_template
  build:
    context: .
    dockerfile: src/trading_pod/Dockerfile
  restart: unless-stopped
  depends_on:
    - internal_db
  volumes:
    - ./src/trading_pod/configs:/app/src/trading_pod/configs:ro

services:
  # Database
  internal_db:
    image: postgres:15-alpine
    container_name: tic_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tic_user
      POSTGRES_PASSWORD: tic_password
      POSTGRES_DB: tic_market_data
    ports:
      - "5432:5432"
    volumes:
      - tic_postgres_data:/var/lib/postgresql/data
      - ./src/etl_hub/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  # ETL Container
  etl_hub:
    build:
      context: .
      dockerfile: src/etl_hub/Dockerfile
    container_name: tic_etl
    restart: unless-stopped
    depends_on:
      - internal_db
    volumes:
      - ./src/etl_hub/config.yaml:/app/src/etl_hub/config.yaml
    env_file:
      - ./secrets/etl.env
    environment:
      DATABASE_URL: postgresql://tic_user:tic_password@internal_db:5432/tic_market_data

  # TRADING PODS
  tic_pod_momentum:
    <<: *trading_template
    container_name: tic_pod_momentum
    environment:
      - STRAT_NAME=momentum
      - DATABASE_URL=postgresql://tic_user:tic_password@internal_db:5432/tic_market_data
    env_file:
      - ./secrets/momentum.env

  tic_pod_pingpong:
    <<: *trading_template
    container_name: tic_pod_pingpong
    environment:
      - STRAT_NAME=pingpong
      - DATABASE_URL=postgresql://tic_user:tic_password@internal_db:5432/tic_market_data
    env_file:
      - ./secrets/pingpong.env

volumes:
  tic_postgres_data: