services:
  # Service 1: The Database (State)
  db:
    image: postgres:15-alpine
    container_name: tic-db
    environment:
      POSTGRES_USER: tic_user
      POSTGRES_PASSWORD: tic_password
      POSTGRES_DB: tic_data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/etl_db/schema.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

  # Service 2: The Data Hub (ETL)
  etl:
    build:
      context: .
      dockerfile: src/etl_db/Dockerfile
    container_name: tic-etl
    depends_on:
      - db
    environment:
      # Internal Docker DNS (db:5432)
      DATABASE_URL: postgresql://tic_user:tic_password@db:5432/tic_data
      ALPACA_KEY: ${ALPACA_KEY}
      ALPACA_SECRET: ${ALPACA_SECRET}
    restart: unless-stopped

  # Service 3: The Trading Pod (Strategy)
  engine:
    build:
      context: .
      dockerfile: src/engine_py/Dockerfile
    container_name: tic-engine
    depends_on:
      - db
    # We want the engine to crash/restart if the DB isn't ready, 
    # but 'depends_on' ensures startup order.
    environment:
      DATABASE_URL: postgresql://tic_user:tic_password@db:5432/tic_data
      ALPACA_KEY: ${ALPACA_KEY}
      ALPACA_SECRET: ${ALPACA_SECRET}
    restart: unless-stopped

volumes:
  postgres_data: